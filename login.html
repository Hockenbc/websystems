<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShowBiz | Login / Signup</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="brand">
      <div class="logo">
        <img src="images/logo.webp" alt="ShowBiz logo" />
      </div>
      <div>
        <h1>ShowBiz</h1>
      </div>
    </div>
    <nav class="main-nav">
      <a href="index.html">Home</a>
      <a href="about.html">About Us</a>
      <a href="leaderboard.html">Leaderboard</a>
      <a href="watchlist.html">Watchlist</a>
      <a href="login.html" class="active">Login / Signup</a>
    </nav>
  </header>

  <main class="auth-layout">
    <section class="panel auth-card">
      <h2>Create an account</h2>
      <p>Sign up to track your favorites and save your progress.</p>
      <form>
        <div class="form-group">
          <label for="email">Email address</label>
          <input id="email" type="email" class="form-input" placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label for="username">Username</label>
          <input id="username" type="text" class="form-input" placeholder="Your username" />
        </div>
        <div class="form-group">
          <label for="password">Create a password</label>
          <input id="password" type="password" class="form-input" placeholder="Enter a strong password" />
        </div>
        <button type="submit" class="form-button">Sign Up</button>
      </form>
      <p class="auth-note">Your Privacy is our priority. We never share your information with third parties.</p>
    </section>
  </main>

  <footer class="site-footer">
    <p>&copy; ShowBiz 2026</p>
  </footer>
</body>
</html>
